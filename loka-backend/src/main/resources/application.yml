server:
  port: 8081

spring:
  application:
    name: loka-backend
  datasource:
    url: jdbc:mysql://localhost:3306/loka?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

jwt:
  secret: lokaSecretKeyForJWTAuthenticationSuperLongKey2024
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.loka: DEBUG
    org.hibernate.SQL: WARN